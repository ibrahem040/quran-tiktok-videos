name: Build Quran Videos

on:
  workflow_dispatch:
    inputs:
      start_page:
        description: "First page number to build"
        required: true
        default: "1"
      end_page:
        description: "Last page number to build (inclusive)"
        required: true
        default: "3"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install requests boto3

      - name: Run video build script
        env:
          QF_CLIENT_ID: ${{ secrets.QF_CLIENT_ID }}
          QF_CLIENT_SECRET: ${{ secrets.QF_CLIENT_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: quran-tiktok-videos
          START_PAGE: ${{ github.event.inputs.start_page }}
          END_PAGE: ${{ github.event.inputs.end_page }}
        run: python scripts/build_videos.py
